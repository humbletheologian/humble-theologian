name: Build local WEB verse pool and deploy site

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate 1,000 local WEB verses
        run: python scripts/build_verse_pool.py

      - name: Validate generated files
        run: |
          test -f assets/data/verse-pool.json
          test -f assets/js/random-verse.js
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(
              Path("assets/data/verse-pool.json").read_text(encoding="utf-8")
          )

          if len(data) != 1000:
              raise SystemExit(f"Expected 1000 verses, found {len(data)}")

          if any(not item.get("reference") or not item.get("text") for item in data):
              raise SystemExit("One or more verse entries are incomplete")

          script = Path("assets/js/random-verse.js").read_text(encoding="utf-8")
          if "HUMBLE_THEOLOGIAN_VERSES" not in script:
              raise SystemExit("Generated JavaScript does not contain the verse pool")

          print("Validated 1,000 complete verses and random-verse.js.")
          PY

      - name: Commit generated verse files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/verse-pool.json assets/js/random-verse.js
          if git diff --cached --quiet; then
            echo "Verse files are already current."
          else
            git commit -m "Build local 1000-verse WEB pool"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
