<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <link rel="icon" href="{{ '/assets/images/Logo32.jpg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo title=false %}
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}

  <script>
    // Open external links in a new tab while leaving Humble Theologian links in the same tab.
    document.addEventListener('DOMContentLoaded', function () {
      var currentHost = window.location.hostname.replace(/^www\./, '');
      document.querySelectorAll('a[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) {
          return;
        }

        try {
          var targetUrl = new URL(href, window.location.href);
          var targetHost = targetUrl.hostname.replace(/^www\./, '');
          var isExternal = targetHost && targetHost !== currentHost;

          if (isExternal) {
            link.setAttribute('target', '_blank');
            var rel = (link.getAttribute('rel') || '').split(/\s+/).filter(Boolean);
            if (!rel.includes('noopener')) rel.push('noopener');
            if (!rel.includes('noreferrer')) rel.push('noreferrer');
            link.setAttribute('rel', rel.join(' '));
          }
        } catch (error) {
          // Leave unusual links alone.
        }
      });
    });
  </script>
</body>
</html>
