---
layout: default
---
<section class="page-hero subtle-hero">
  <div class="wrap narrow">
    <p class="eyebrow">{{ page.kicker | default: site.title }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lede">{{ page.description }}</p>{% endif %}
  </div>
</section>
<section class="page-content">
  <div class="wrap narrow prose">
    {{ content }}
  </div>
</section>
