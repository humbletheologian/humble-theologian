title: Humble Theologian
tagline: Learning, loving and living the faith.
description: A personal theology and Bible study resource for Bible college students and serious theologically minded Christians.
author: Shayne Johnston
email: shayne.johnston@humbletheologian.com
url: "https://www.humbletheologian.com"
baseurl: ""
permalink: /:title/
markdown: kramdown
theme: null

collections:
  love-as-a-verb:
    output: true
    permalink: /love-as-a-verb/:name/
  spurgeon:
    output: true
    permalink: /spurgeon/:name/

plugins:
  - jekyll-feed
  
feed:
  posts_limit: 50
  
  - jekyll-seo-tag

exclude:
  - README.md
  - CONTENT-GUIDE.md
  - GITHUB-PAGES-SETUP.md
  - LOCAL-PREVIEW-INSTRUCTIONS.md
  - LAUNCH-AUDIT.md
