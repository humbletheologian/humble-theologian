<article class="card post-card">
  <p class="eyebrow">{{ include.post.category }}</p>
  <h3><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h3>
  <p>{{ include.post.description }}</p>
  <div class="meta">{% if include.post.words %}Approx. {{ include.post.words }} words · {% endif %}{{ include.post.date | date: "%d %b %Y" }}</div>
</article>
